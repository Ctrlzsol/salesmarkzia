<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المركزية — محرك تحليل المبيعات المالي</title>
    <meta name="description" content="منصة المركزية لتحليل بيانات المبيعات ونقاط البيع — تقارير تفاعلية عميقة ومقارنات شهرية" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
    <script>
      window.addEventListener('error', function(e) {
        if (e && e.message && (
          e.message.includes('getManifest') ||
          e.message.includes('browser_polyfill') ||
          e.message.includes('chrome.runtime')
        )) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        if (e && e.reason && e.reason.message && (
          e.reason.message.includes('getManifest') ||
          e.reason.message.includes('browser_polyfill') ||
          e.reason.message.includes('chrome.runtime')
        )) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
